<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل فيديوهات تيك توك</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #fe2c55; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; display: none; }
        .video-preview { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .download-btn { background: #25d366; text-decoration: none; display: block; padding: 10px; color: white; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>تحميل فيديوهات TikTok 🎥</h2>
    <input type="text" id="videoUrl" placeholder="الصق رابط الفيديو هنا...">
    <button onclick="downloadVideo()">جلب الفيديو</button>

    <div id="result">
        <p>تم العثور على الفيديو!</p>
        <a id="downloadLink" class="download-btn" href="#" target="_blank">تحميل الآن (بدون علامة مائية)</a>
    </div>
</div>

<script>
    async function downloadVideo() {
        const url = document.getElementById('videoUrl').value;
        const resultDiv = document.getElementById('result');
        const downloadLink = document.getElementById('downloadLink');

        if (!url) { alert("يرجى لصق الرابط أولاً!"); return; }

        try {
            // نستخدم هنا API مجاني لجلب بيانات الفيديو
            const response = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.video && data.video.noWatermark) {
                downloadLink.href = data.video.noWatermark;
                resultDiv.style.display = 'block';
            } else {
                alert("تعذر العثور على الفيديو، تأكد من الرابط.");
            }
        } catch (error) {
            alert("حدث خطأ في الاتصال بالخادم.");
        }
    }
</script>

</body>
</html>
