<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الوزن المثالي والغذاء الصحي</title>
    <style>
        :root {
            --primary-color: #27ae60;
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; color: var(--secondary-color); margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary-color); outline: none; }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        #result-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
            display: none;
        }
        .bmi-badge {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        .status-text { text-align: center; font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
        .info-box {
            background: #eef2f3;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .info-box h4 { margin-top: 0; color: var(--secondary-color); border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .foods-list { color: #444; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h2>حاسبة الوزن والغذاء 🍎</h2>
    
    <div class="input-group">
        <label>الطول (سم):</label>
        <input type="number" id="height" placeholder="مثلاً: 175">
    </div>

    <div class="input-group">
        <label>الوزن (كجم):</label>
        <input type="number" id="weight" placeholder="مثلاً: 75">
    </div>

    <button onclick="calculate()">احسب الآن</button>

    <div id="result-section">
        <div class="bmi-badge" id="bmi-val">--</div>
        <div class="status-text" id="status-txt"></div>
        
        <div class="info-box">
            <h4>💡 النصيحة الصحية:</h4>
            <div id="advice-txt" class="foods-list"></div>
        </div>

        <div class="info-box">
            <h4>🥦 أغذية مقترحة لك:</h4>
            <div id="foods-txt" class="foods-list"></div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const h = document.getElementById('height').value / 100;
        const w = document.getElementById('weight').value;
        const resSection = document.getElementById('result-section');

        if(h > 0 && w > 0) {
            const bmi = (w / (h * h)).toFixed(1);
            document.getElementById('bmi-val').innerText = bmi;
            resSection.style.display = 'block';

            let status = "";
            let advice = "";
            let foods = "";
            let color = "";

            if (bmi < 18.5) {
                status = "نقص في الوزن";
                color = "#f39c12";
                advice = "تحتاج لزيادة السعرات الحرارية بشكل صحي لزيادة الكتلة العضلية.";
                foods = "المكسرات، الأفوكادو، زيت الزيتون، اللحوم الحمراء، البيض، البطاطس، والموز.";
            } else if (bmi < 25) {
                status = "وزن مثالي";
                color = "#27ae60";
                advice = "وزنك رائع! استمر في الحفاظ على هذا التوازن مع الرياضة.";
                foods = "الأسماك، صدور الدجاج، الفواكه الطازجة، الخضروات، الشوفان، ومنتجات الألبان قليلة الدسم.";
            } else if (bmi < 30) {
                status = "زيادة في الوزن";
                color = "#e67e22";
                advice = "يفضل تقليل السكريات والنشويات المكررة وزيادة الحركة اليومية.";
                foods = "الخضروات الورقية، البقوليات (عدس، فول)، التفاح، الأسماك المشوية، وشرب الكثير من الماء.";
            } else {
                status = "سمنة";
                color = "#e74c3c";
                advice = "من الأفضل استشارة مختص لتقليل السعرات، والبدء بالمشي يومياً لمدة 30 دقيقة.";
                foods = "البروكلي، القرنبيط، التونة (بالماء)، الفواكه قليلة السكر (توت، فراولة)، والشوربات الصحية.";
            }

            const statusTxt = document.getElementById('status-txt');
            statusTxt.innerText = status;
            statusTxt.style.color = color;
            document.getElementById('bmi-val').style.color = color;
            document.getElementById('advice-txt').innerText = advice;
            document.getElementById('foods-txt').innerText = foods;
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("الرجاء إدخال الطول والوزن بشكل صحيح.");
        }
    }
</script>

</body>
</html>
